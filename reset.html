<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset - Controle de Produção</title>
<style>
body {
  margin: 0;
  padding: 20px;
  background: #14161C;
  color: #EDEEF2;
  font-family: 'Inter', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
.container {
  max-width: 400px;
  background: #1C1F28;
  border: 1px solid #333844;
  border-radius: 12px;
  padding: 40px;
  text-align: center;
}
h1 { font-size: 24px; margin: 0 0 20px 0; }
.status {
  font-size: 14px;
  color: #8A8F9C;
  margin: 20px 0;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.btn {
  background: #7C8CF8;
  color: white;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  width: 100%;
  margin-top: 20px;
  font-weight: 600;
}
.btn:hover { background: #6B7AE8; }
.success { color: #6EE7B7; }
.error { color: #F87171; }
.info { color: #93C5FD; }
</style>
</head>
<body>

<div class="container">
  <h1>🔄 Reset Total</h1>
  <div class="status" id="status">Carregando...</div>
  <button class="btn" id="btnReset">Limpar Tudo Agora</button>
</div>

<script>
async function doReset() {
  const statusEl = document.getElementById('status');
  const btnReset = document.getElementById('btnReset');
  btnReset.disabled = true;

  try {
    statusEl.innerHTML = '<span class="info">⏳ Limpando localStorage...</span>';
    localStorage.clear();
    sessionStorage.clear();

    statusEl.innerHTML = '<span class="info">⏳ Resetando IndexedDB...</span>';
    const dbs = await indexedDB.databases();
    for (const db of dbs) {
      indexedDB.deleteDatabase(db.name);
    }

    statusEl.innerHTML = '<span class="info">⏳ Limpando cookies...</span>';
    document.cookie.split(";").forEach(c => {
      document.cookie = c.replace(/^ +/, "").replace(/=.*/, "=;expires=" + new Date().toUTCString() + ";path=/");
    });

    // Aguardar um pouco
    await new Promise(r => setTimeout(r, 1000));

    statusEl.innerHTML = '<span class="success">✅ Limpeza Completa!</span><br><br>Redirecionando para o app...';

    // Redirecionar para app
    setTimeout(() => {
      window.location.href = './index.html';
    }, 2000);

  } catch (e) {
    statusEl.innerHTML = '<span class="error">❌ Erro: ' + e.message + '</span>';
    btnReset.disabled = false;
  }
}

// Se vindo de URL com parâmetro, fazer auto-reset
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('auto') === 'true') {
  document.getElementById('btnReset').click();
}

document.getElementById('btnReset').onclick = doReset;
</script>

</body>
</html>
