<style>

  #app{max-width:var(--app-max); margin:0 auto; min-height:100vh; display:flex; flex-direction:column; position:relative; background:transparent;}

  .topbar-brand{display:flex; align-items:center; gap:10px; min-width:0;}
  .topbar-brand img{height:30px; width:auto; display:block; flex-shrink:0;}
  .topbar h1{font-size:13px; margin:0; font-weight:700; color:var(--text); letter-spacing:-0.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .topbar .date{font-size:11px; color:var(--text-dim); font-family:'IBM Plex Mono',monospace; flex-shrink:0; text-transform:uppercase; letter-spacing:.04em;}
  .topbar-right{display:flex; align-items:center; gap:8px; flex-shrink:0;}
  .body-shell{flex:1; display:flex; flex-direction:column; min-height:0;}
  .tabbar-wrap{background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0;}
  .tabbar{display:flex; flex-wrap:wrap;}
  .tabbtn{flex:0 0 auto; background:none; border:none; padding:10px 12px; font-size:11.5px; font-family:'Inter',sans-serif; font-weight:500; color:var(--text-dim); cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap; transition:color .15s;}
  .tabbtn.active{color:var(--accent); border-bottom-color:var(--accent); font-weight:700;}
  main{flex:1; padding:16px 14px 30px; overflow-y:auto; width:100%;}

    :root{--app-max:1180px;}
    .body-shell{flex-direction:row; align-items:flex-start;}
    .tabbar-wrap{width:220px; flex-shrink:0; border-bottom:none; border-right:1px solid var(--border); position:sticky; top:0; align-self:stretch;}
    .tabbar{flex-direction:column; padding:12px 0;}
    .tabbtn{width:100%; text-align:left; padding:11px 20px; border-bottom:none; border-left:3px solid transparent; font-size:12.5px;}
    .tabbtn.active{border-left-color:var(--accent); border-bottom-color:transparent; background:var(--accent-soft);}
    main{max-width:1000px; margin:0 auto; padding:32px 36px 60px;}
    .metric-grid{grid-template-columns:repeat(4,1fr);}
    .card{padding:20px 24px;}
    .modal-overlay{align-items:center;}
    .modal{max-width:560px; border-radius:16px; max-height:85vh;}

  .card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-bottom:12px; box-shadow:0 4px 14px rgba(0,0,0,.25);}
  .metric-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px;}
  .metric{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px; box-shadow:0 4px 14px rgba(0,0,0,.25);}
  .metric .label{font-size:10.5px; color:var(--text-dim); text-transform:uppercase; letter-spacing:.06em; margin-bottom:5px; font-weight:600;}
  .metric .value{font-size:22px; font-weight:700; font-family:'IBM Plex Mono',monospace; color:var(--text);}

  .tag-costura{background:rgba(196,181,253,.15); color:var(--costura);}
  .tag-revisao{background:rgba(110,231,183,.14); color:var(--revisao);}
  .tag-enviado{background:rgba(255,255,255,.08); color:var(--text-dim);}
  .tag-retornado{background:rgba(147,197,253,.15); color:var(--retornado);}
  .tag-revisado{background:rgba(110,231,183,.14); color:var(--revisao);}

  .item-right{text-align:right; font-family:'IBM Plex Mono',monospace; font-size:13px; white-space:nowrap;}
  .item-actions{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; align-items:center;}
  .item-note{font-size:11.5px; color:var(--text-dim); margin-top:6px;}
  .subitem{margin-top:10px; padding:10px 0 10px 12px; border-left:2px solid var(--accent); background:var(--surface-2); border-radius:0 8px 8px 0;}
  .subitem-label{font-size:10.5px; font-weight:700; color:var(--text-dim); text-transform:uppercase; letter-spacing:.03em; margin-bottom:3px;}

  .fin-vals{display:flex; gap:6px; flex-shrink:0;}

let firebaseDb = null;
function getFirebaseDb(){
  if(firebaseDb) return firebaseDb;
  if(!FIREBASE_CONFIG.apiKey || FIREBASE_CONFIG.apiKey==='COLE_AQUI'){
    throw new Error('FIREBASE_CONFIG não configurado');
  }
  firebase.initializeApp(FIREBASE_CONFIG);
  firebaseDb = firebase.firestore();
  return firebaseDb;
}

if(typeof window.storage === 'undefined' || !window.storage){
  window.storage = {
    async get(key){
      const db = getFirebaseDb();
      const snap = await db.collection('controle_producao_dados').doc(key).get();
      if(!snap.exists) return null;
      return {key, value: snap.data().value};
    },
    async set(key, value){
      const db = getFirebaseDb();
      await db.collection('controle_producao_dados').doc(key).set({value});
      return {key, value};
    }
  };
}

async function hashPassword(senha){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(senha));

function finLeafKeys(node, out){
  out = out || [];
  if(node.children) node.children.forEach(c=>finLeafKeys(c, out));
  else out.push(node.key);
  return out;
}
function finEmptyValues(dados){
  // soma valores brutos (planejado/acontecido) de um objeto {key:{p,a}}, calculando os nós-soma da árvore
  const vals = {};
  function walk(node){
    if(node.children){
      let p=0, a=0;
      node.children.forEach(c=>{ walk(c); p += vals[c.key].p; a += vals[c.key].a; });
      vals[node.key] = {p, a};
    }else{
      const raw = (dados && dados[node.key]) || {};
      vals[node.key] = {p:Number(raw.p)||0, a:Number(raw.a)||0};
    }
  }
  FIN_TREE.forEach(walk);
  walk(FIN_INVEST_TREE);
  return vals;
}
function finGetLucroAcumulado(ano, mesIdx){
  // soma recursiva: lucro líquido de todos os meses até mesIdx (inclusive) do ano
  let acc = 0;
  for(let i=0;i<=mesIdx;i++){
    const dados = (financeiro[ano] && financeiro[ano][FIN_MESES[i]]) || {};
    acc += finCalcResumo(dados).lucroLiquido.a;
  }
  return acc;
}
function finCalcResumo(dados){
  const v = finEmptyValues(dados);
  const receitasNaoOp = (dados && dados['receitasNaoOp']) || {p:0,a:0};
  const despesasNaoOp = (dados && dados['despesasNaoOp']) || {p:0,a:0};
  const retiradaLucros = (dados && dados['retiradaLucros']) || {p:0,a:0};
  const valorPagoMerc = (dados && dados['valorPagoMerc']) || {p:0,a:0};
  const rno = {p:Number(receitasNaoOp.p)||0, a:Number(receitasNaoOp.a)||0};
  const dno = {p:Number(despesasNaoOp.p)||0, a:Number(despesasNaoOp.a)||0};
  const ret = {p:Number(retiradaLucros.p)||0, a:Number(retiradaLucros.a)||0};
  const vpm = {p:Number(valorPagoMerc.p)||0, a:Number(valorPagoMerc.a)||0};
  const vendas = v.vendas, custosVar = v.custosVar, custosFixos = v.custosFixos, invest = v.investimentos;
  const margem = {p:vendas.p-custosVar.p, a:vendas.a-custosVar.a};
  const lucroOp = {p:margem.p-custosFixos.p, a:margem.a-custosFixos.a};
  const lucroLiquido = {
    p: lucroOp.p + rno.p - dno.p - invest.p - ret.p,
    a: lucroOp.a + rno.a - dno.a - invest.a - ret.a
  };
  const pontoEqOperacional = {
    p: margem.p ? (custosFixos.p/margem.p)*vendas.p : 0,
    a: margem.a ? (custosFixos.a/margem.a)*vendas.a : 0
  };
  const pontoEqFinanceiro = {
    p: margem.p ? ((custosFixos.p+invest.p+ret.p+dno.p)/margem.p)*vendas.p : 0,
    a: margem.a ? ((custosFixos.a+invest.a+ret.a+dno.a)/margem.a)*vendas.a : 0
  };
  const avaliacaoEstoque = {p: vpm.p-v.cmv.p, a: vpm.a-v.cmv.a};
  return {v, margem, lucroOp, receitasNaoOp:rno, despesasNaoOp:dno, investimentos:invest, retiradaLucros:ret,
    lucroLiquido, pontoEqOperacional, pontoEqFinanceiro, valorPagoMerc:vpm, avaliacaoEstoque};
}

function finAllLeaves(){
  // achata a árvore do Financeiro numa lista {key,label,path} pra usar no seletor de categoria
  const out = [];
  function walk(nodes, path){
    nodes.forEach(node=>{
      const p = path ? path+' › '+node.label : node.label;
      if(node.children) walk(node.children, path);
      else out.push({key:node.key, label:node.label, path:p});
    });
  }
  walk(FIN_TREE, '');
  walk(FIN_INVEST_TREE.children, FIN_INVEST_TREE.label);
  out.push({key:'receitasNaoOp', label:'Receitas não Operacionais', path:''});
  out.push({key:'despesasNaoOp', label:'Despesas não Operacionais', path:''});
  out.push({key:'retiradaLucros', label:'Retirada de Lucros', path:''});
  return out;
}

function suggestCategoria(fornecedor, descricao){
  const txt = normalizeTxt((fornecedor||'')+' '+(descricao||''));
  if(!txt.trim()) return null;
  // 1) aprendizado: já usei esse fornecedor antes?
  const fornecedorNorm = normalizeTxt(fornecedor);
  if(fornecedorNorm && contasAprendizado[fornecedorNorm]) return contasAprendizado[fornecedorNorm];
  // 2) dicionário de palavras-chave: pega o match mais específico (palavra mais longa)
  let melhor = null, melhorLen = 0;
  for(const [categoria, palavras] of Object.entries(CONTAS_KEYWORD_MAP)){
    palavras.forEach(p=>{
      if(p && txt.includes(p) && p.length>melhorLen){ melhor = categoria; melhorLen = p.length; }
    });
  }
  return melhor;
}

// Aplica (soma) ou reverte o valor de uma conta paga no Acontecido do Financeiro.
// Sempre reverte primeiro, depois reaplica com os dados atuais — evita contar em dobro
// ou deixar valor "esquecido" no Financeiro quando a conta é editada, excluída ou reaberta.
function reverterContaDoFinanceiro(c){
  if(!c._finAplicado) return;
  const {_finAno:ano, _finMes:mes, _finCategoria:cat, _finValorAplicado:val} = c;
  if(financeiro[ano] && financeiro[ano][mes] && financeiro[ano][mes][cat]){
    financeiro[ano][mes][cat].a = (Number(financeiro[ano][mes][cat].a)||0) - Number(val||0);
  }
  c._finAplicado = false;
  c._finAno = null; c._finMes = null; c._finCategoria = null; c._finValorAplicado = null;
}
function reaplicarContaNoFinanceiro(c){
  reverterContaDoFinanceiro(c);
  if(c.historico) return; // histórico importado nunca mexe no Financeiro (já está contabilizado na planilha original)
  if(c.status!=='pago') return;
  if(!c.categoriaFinanceira) return;
  if(!c.dataPagamento) return;
  const d = new Date(c.dataPagamento+'T00:00:00');
  const ano = String(d.getFullYear());
  const mes = FIN_MESES[d.getMonth()];
  const cat = c.categoriaFinanceira;
  const valor = Number(c.valor)||0;
  if(!financeiro[ano]) financeiro[ano] = {};
  if(!financeiro[ano][mes]) financeiro[ano][mes] = {};
  if(!financeiro[ano][mes][cat]) financeiro[ano][mes][cat] = {p:0,a:0};
  financeiro[ano][mes][cat].a = (Number(financeiro[ano][mes][cat].a)||0) + valor;
  c._finAplicado = true;
  c._finAno = ano; c._finMes = mes; c._finCategoria = cat; c._finValorAplicado = valor;
}

function migrateLote(p){
  if(p.quantidadeAproveitavel===undefined){
    const naoAprov = (p.quantidadePerda||0) + (p.quantidadeConserto||0) + (p.quantidadeDefeituosa||0);
    p.quantidadeAproveitavel = p.quantidadeRetornada!=null ? Math.max(0,(p.quantidadeRetornada - naoAprov)) : null;
    p.quantidadeNaoAproveitavel = naoAprov;
    p.valorCredito = p.valorDesconto || 0;
    p.creditoAplicado = p.descontoAplicado!==undefined ? p.descontoAplicado : true;
  }
  if(p.dataPagamento===undefined) p.dataPagamento = p.paga ? (p.dataRetorno||p.data||null) : null;
  if(p.status==='conferido') p.status = 'revisado';
  if(p.tamanhosPlanejados && !p.tamanhosSolicitados){
    p.tamanhosSolicitados = {};
    TAMS.forEach(t=>{ p.tamanhosSolicitados[t] = Number(p.tamanhosPlanejados[t]||0)>0; });
  }
  if(p.etapa==='corte' && p.status==='revisado'){
    p.status = 'retornado';
  }
  if(p.etapa==='corte'){
    if(p.pesoRibana===undefined) p.pesoRibana = 0;
    if(p.fornecedorTecido===undefined) p.fornecedorTecido = '';
    if(p.fornecedorRibana===undefined) p.fornecedorRibana = '';
    if(p.precoKgTecido===undefined) p.precoKgTecido = 0;
    if(p.precoKgRibana===undefined) p.precoKgRibana = 0;
    if(p.numeroLoteFornecedor===undefined) p.numeroLoteFornecedor = '';
    if(p.consumoTecidoPorPeca===undefined) p.consumoTecidoPorPeca = null;
    if(p.consumoRibanaPorPeca===undefined) p.consumoRibanaPorPeca = null;
    if(p.custoTecidoPorPeca===undefined) p.custoTecidoPorPeca = null;
    if(p.custoRibanaPorPeca===undefined) p.custoRibanaPorPeca = null;
    if(p.custoMateriaPrimaPorPeca===undefined) p.custoMateriaPrimaPorPeca = null;
  }
  if(p.etapa!=='corte'){
    if(p.loteCorteOrigemId===undefined) p.loteCorteOrigemId = null;
    if(p.custoCorteHerdado===undefined) p.custoCorteHerdado = null;
    if(p.precoKgTecidoHerdado===undefined) p.precoKgTecidoHerdado = null;
    if(p.precoKgRibanaHerdado===undefined) p.precoKgRibanaHerdado = null;
    if(p.custoLaborCorteHerdado===undefined) p.custoLaborCorteHerdado = null;
    if(p.proporcaoTecidoHerdada===undefined) p.proporcaoTecidoHerdada = null;
    if(p.valorPrejuizoTotal===undefined) p.valorPrejuizoTotal = p.quantidadeNaoAproveitavel>0 ? Number(p.valorCredito||0) : 0;
  }
  if(p.etapa==='corte'){
    if(p.custoInsumosExtrasPorPeca===undefined) p.custoInsumosExtrasPorPeca = 0;
    if(p.custoCompletoPorPeca===undefined) p.custoCompletoPorPeca = p.custoMateriaPrimaPorPeca!=null ? p.custoMateriaPrimaPorPeca + Number(p.valorUnit||0) : null;
    if(p.metaRendimentoBobina===undefined) p.metaRendimentoBobina = 0;
    if(p.rendimentoObtido===undefined) p.rendimentoObtido = p.quantidadeRetornada!=null ? p.quantidadeRetornada : null;
    if(p.diferencaRendimento===undefined) p.diferencaRendimento = (p.metaRendimentoBobina>0 && p.quantidadeRetornada!=null) ? p.quantidadeRetornada-p.metaRendimentoBobina : null;
  }
  if(p.etapa!=='corte' && p.quantidadeEnviadaOriginal===undefined){
    p.quantidadeEnviadaOriginal = p.quantidadeEnviada;
  }
  if(p.envioGrupoId===undefined){
    p.envioGrupoId = p.id;
  }
  if(p.status) return p;
  p.quantidadeEnviada = p.quantidade;
  p.quantidadeRetornada = p.quantidade;
  p.dataEnvio = p.data;
  p.dataRetorno = p.data;
  p.quantidadeAproveitavel = p.quantidade;
  p.quantidadeNaoAproveitavel = 0;
  p.valorCredito = 0;
  p.creditoAplicado = true;
  p.status = 'revisado';
  return p;
}

async function loadCollection(key, migrateFn){
  let raw;
  try{ raw = await window.storage.get(key); }
  catch(e){ showToast('Não consegui acessar os dados salvos ('+key+')'); return []; }
  if(!raw) return [];
  let arr;
  try{ arr = JSON.parse(raw.value); }
  catch(e){ showToast('Os dados salvos de "'+key+'" parecem corrompidos'); return []; }
  if(!Array.isArray(arr)) return [];
  if(!migrateFn) return arr;
  const out = [];
  let falhas = 0;
  arr.forEach(item=>{
    try{ out.push(migrateFn(item)); }
    catch(e){ falhas++; out.push(item); }
  });
  if(falhas>0) showToast(falhas+' registro(s) de "'+key+'" tiveram um problema ao carregar, mas foram mantidos');
  return out;
}

    document.getElementById('btnSetup').onclick = async ()=>{
      const nome = document.getElementById('setupNome').value.trim();
      const senha = document.getElementById('setupSenha').value;
      if(!nome || !senha){ showToast('Preencha nome e senha'); return; }
      const u = {id:uid(), nome, senha: await hashPassword(senha), papel:'admin'};
      usuarios.push(u);
      await saveUsuarios();
      loginAs(u);
    };
  }else{
    el.innerHTML = `<div style="max-width:320px; width:100%;">
      ${logo}
      <div class="card">
      <h3 style="margin-top:0;">Entrar</h3>
      <div class="field"><label>Nome</label><input id="loginNome" placeholder="Seu nome"></div>
      <div class="field"><label>Senha</label><input id="loginSenha" type="password"></div>
      <button class="btn btn-primary" style="width:100%;" id="btnLogin">Entrar</button>
    </div></div>`;
    const tryLogin = async ()=>{
      const nome = document.getElementById('loginNome').value.trim();
      const senha = document.getElementById('loginSenha').value;
      const cand = usuarios.find(x=>x.nome.toLowerCase()===nome.toLowerCase());
      if(!cand){ showToast('Usuário ou senha incorretos'); return; }
      const hash = await hashPassword(senha);
      const legacyMatch = cand.senha === senha && cand.senha.length !== 64;
      if(cand.senha !== hash && !legacyMatch){ showToast('Usuário ou senha incorretos'); return; }
      if(legacyMatch){ cand.senha = hash; await saveUsuarios(); }
      loginAs(cand);
    };
    document.getElementById('btnLogin').onclick = tryLogin;
    document.getElementById('loginSenha').onkeydown = (e)=>{ if(e.key==='Enter') tryLogin(); };
  }
}
function loginAs(u){
  currentUser = u;
  try{ localStorage.setItem('jl_session', u.id); }catch(e){}
  applyAuthState();
}
function logout(){
  currentUser = null;
  try{ localStorage.removeItem('jl_session'); }catch(e){}
  applyAuthState();
}
function updateUserBadge(){
  const el = document.getElementById('userBadge');
  if(!el) return;
  if(!currentUser){ el.innerHTML=''; return; }
  el.innerHTML = `${escapeHtml(currentUser.nome)}<button class="btn" id="btnLogout">Sair</button>`;
  document.getElementById('btnLogout').onclick = logout;
}
function applyAuthState(){
  document.body.classList.toggle('locked', !currentUser);
  document.body.classList.remove('role-admin','role-colaborador');
  if(currentUser) document.body.classList.add('role-'+currentUser.papel);
  if(!currentUser){ renderAuthScreen(); return; }
  if(currentUser.papel!=='admin' && ['pagamentos','perdas','materiaprima','contaspagar','financeiro','config'].includes(activeTab)){
    activeTab = 'dashboard';
    document.querySelectorAll('.tabbtn').forEach(b=>b.classList.toggle('active', b.dataset.tab==='dashboard'));

}

function findRate(nome, produto){
  const f = config.find(c=>c.nome===nome);

function precoMedioRibanaPorProduto(produto){

function custoLaborCorteMedioPorProduto(produto){

function proporcaoTecidoPorProduto(produto){
  const lotes = producao.filter(x=>x.etapa==='corte' && x.produto===produto && (Number(x.pesoBobinas)+Number(x.pesoRibana))>0);
  if(!lotes.length) return 1;
  const pesoTecidoTotal = lotes.reduce((s,x)=>s+Number(x.pesoBobinas||0),0);
  const pesoTotal = lotes.reduce((s,x)=>s+Number(x.pesoBobinas||0)+Number(x.pesoRibana||0),0);
  return pesoTotal>0 ? pesoTecidoTotal/pesoTotal : 1;
}

function buildChartSvg(base){
  const dias = [];
  for(let i=13;i>=0;i--){
    const d = new Date();
    d.setDate(d.getDate()-i);
    dias.push(d.toISOString().slice(0,10));
  }
  const porDia = {};
  dias.forEach(d=>porDia[d]=0);
  base.forEach(p=>{ if(p.dataRetorno && porDia[p.dataRetorno]!==undefined) porDia[p.dataRetorno]+=Number(p.quantidadeRetornada||0); });
  const valores = dias.map(d=>porDia[d]);
  const max = Math.max(1, ...valores);
  const w = 320, h = 110, bw = w/dias.length;
  let bars = '';
  dias.forEach((d,i)=>{
    const v = porDia[d];
    const bh = (v/max)*80;
    const x = i*bw + 2;
    const y = 90 - bh;
    bars += `<rect x="${x}" y="${y}" width="${bw-4}" height="${bh}" rx="2" fill="var(--accent)" opacity="${v>0?1:0.15}"></rect>`;
    if((dias.length-1-i)%3===0) bars += `<text x="${x+((bw-4)/2)}" y="105" font-size="8" fill="var(--text-dim)" text-anchor="middle" font-family="IBM Plex Mono, monospace">${d.slice(8,10)}/${d.slice(5,7)}</text>`;
  });
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; display:block;">${bars}</svg>`;
}

function renderProducao(){
  // agrupa por envio original (envioGrupoId), assim retiradas parciais do mesmo envio ficam num só card
  const grupos = {};
  producao.forEach(p=>{
    const key = p.envioGrupoId || p.id;
    if(!grupos[key]) grupos[key] = [];
    grupos[key].push(p);
  });
  const grupoConcluido = g => g.every(p=>p.paga && p.status!=='enviado');

  let listaGrupos = Object.values(grupos);
  listaGrupos = producaoFiltro==='ativos' ? listaGrupos.filter(g=>!grupoConcluido(g)) : listaGrupos.filter(g=>grupoConcluido(g));
  listaGrupos.sort((a,b)=> b[0].dataEnvio.localeCompare(a[0].dataEnvio));

  let html = `<div class="filter-row">
    <button class="btn-toggle ${producaoFiltro==='ativos'?'active':''}" id="btnFiltroAtivos">Em produção</button>
    <button class="btn-toggle ${producaoFiltro==='concluidos'?'active':''}" id="btnFiltroConcluidos">Concluídos</button>
  </div>`;

  if(listaGrupos.length===0){
    html += `<div class="empty">Nenhum lote nesta lista.</div>`;
    return html;
  }
  html += `<div class="card">`;
  listaGrupos.forEach(g=>{
    const head = g[0];
    const isCorte = head.etapa==='corte';
    const pendente = g.find(p=>p.status==='enviado');
    const finalizados = g.filter(p=>p.status!=='enviado').sort((a,b)=> (a.dataRetorno||'').localeCompare(b.dataRetorno||''));
    const statusGeral = pendente ? 'enviado' : (finalizados.length>0 && finalizados.every(p=>p.status==='revisado') ? 'revisado' : 'retornado');

    html += `<div class="item">
      <div class="item-top">
        <div>
          <div class="item-title">${escapeHtml(head.produto)}${isCorte?(' · '+escapeHtml(head.cor||'-')):''}</div>
          <div class="item-sub">${escapeHtml(head.funcionario)} · enviado ${fmtDateBR(head.dataEnvio)}${isCorte&&head.pesoBobinas?(' · '+head.pesoBobinas+' kg'):''}</div>
        </div>
        <div class="item-right">
          <span class="tag tag-${head.etapa}">${STAGE_LABEL[head.etapa]}</span><br>
          <span class="tag tag-${statusGeral}" style="margin-top:4px;">${STATUS_LABEL[statusGeral]}</span>
        </div>
      </div>`;

    if(isCorte){
      // corte nunca é dividido em retiradas parciais: card único, igual antes
      const p = head;
      if(p.tamanhosSolicitados){
        const ts = p.tamanhosSolicitados;
        const pedidos = TAMS.filter(t=>ts[t]).join(', ');
        html += `<div class="item-note">Tamanhos pedidos: ${pedidos||'-'}</div>`;
      }
      if(p.tamanhosCortados){
        const tc = p.tamanhosCortados;
        html += `<div class="item-note">Rendeu: P ${tc.P||0} · M ${tc.M||0} · G ${tc.G||0} · GG ${tc.GG||0}${p.pesoBobinas?(' · '+(p.quantidadeRetornada/p.pesoBobinas).toFixed(1)+' pç/kg'):''}</div>`;
        if(Number(p.metaRendimentoBobina)>0){
          const diff = p.diferencaRendimento!=null ? p.diferencaRendimento : (p.quantidadeRetornada-p.metaRendimentoBobina);
          const emoji = diff>0?'🟢':(diff<0?'🔴':'🟡');
          html += `<div class="item-note">${emoji} Meta: ${p.metaRendimentoBobina} pç · Real: ${p.rendimentoObtido!=null?p.rendimentoObtido:p.quantidadeRetornada} pç · Diferença: ${diff>=0?'+':''}${diff}</div>`;
        }
      }
      if(p.status!=='enviado'){
        html += `<div class="item-note">Retornaram ${p.quantidadeRetornada||0} peças · ${fmtMoney(p.valorTotal)} · ${p.paga?('pago em '+fmtDateBR(p.dataPagamento)):'pendente'}</div>`;
      }
      html += `<div class="item-actions">`;

      html += `</div>`;
    }else{
      // costura: mostra o que ainda falta retirar (se houver) e o histórico de retiradas já feitas deste envio
      if(pendente){
        const te = pendente.tamanhosEnviados||{};
        html += `<div class="item-note">Aguardando retirada: P ${te.P||0} · M ${te.M||0} · G ${te.G||0} · GG ${te.GG||0}</div>`;

          html += `<div class="item-note" style="color:var(--retornado)">${jaRetirado} peça(s) já retirada(s) em ${finalizados.length} coleta(s) anterior(es)</div>`;
        }
        html += `<div class="item-actions">
          <button class="btn btn-primary" data-action="registrarRetorno" data-id="${pendente.id}">Registrar retorno</button>
          <button class="btn" data-action="editarLote" data-id="${pendente.id}">Editar</button>
          <button class="btn btn-danger" data-action="delProducao" data-id="${pendente.id}" style="margin-left:auto;">Excluir</button>

      }
      finalizados.forEach(f=>{

          ${Number(f.pesoNaoCosturado)>0?`<div class="subitem-row" style="color:var(--perda)">Peso sem aproveitamento: ${f.pesoNaoCosturado} kg</div>`:''}
          ${f.status==='revisado' && Number(f.quantidadeNaoAproveitavel)>0?`<div class="subitem-row" style="color:var(--perda)">${f.quantidadeNaoAproveitavel} peça(s) sem aproveitamento · crédito de ${fmtMoney(f.valorCredito)} · ${f.creditoAplicado?'já abatido':'ainda não abatido'}</div>`:''}
          <div class="subitem-actions">
            <button class="btn" data-action="editarLote" data-id="${f.id}">Editar</button>
            ${f.paga?`<button class="btn" data-action="desfazerPagamento" data-id="${f.id}">Desfazer pagamento</button>`:''}
            ${f.status==='revisado' && f.creditoAplicado && Number(f.valorCredito)>0?`<button class="btn" data-action="reabrirCredito" data-id="${f.id}">Reabrir crédito</button>`:''}
            <button class="btn btn-danger" data-action="delProducao" data-id="${f.id}" style="margin-left:auto;">Excluir</button>
          </div>
        </div>`;
      });
    }
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

        </div>
        ${p.quantidadeNaoAproveitavel>0 ? `<div class="item-note" style="color:var(--perda)">${p.quantidadeNaoAproveitavel} peça(s) descartada(s)${p.pesoDescartado?(' · '+p.pesoDescartado+' kg'):''} · Prejuízo total: ${fmtMoney(p.valorPrejuizoTotal||0)}</div>` : ''}
        <div class="item-actions">
          <button class="btn" data-action="editarRevisao" data-id="${p.id}">Editar</button>
          <button class="btn btn-danger" data-action="delProducao" data-id="${p.id}" style="margin-left:auto;">Excluir</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}

function renderPagamentos(){
  const byFunc = {};
  producao.forEach(p=>{
    if(p.status==='enviado') return;
    const f = p.funcionario || 'Sem nome';
    if(!byFunc[f]) byFunc[f] = {pendente:0, pago:0, credito:0, pecasNaoAproveitadas:0};
    if(p.paga) byFunc[f].pago += Number(p.valorTotal||0);
    else byFunc[f].pendente += Number(p.valorTotal||0);
    if(p.status==='revisado' && !p.creditoAplicado){
      byFunc[f].credito += Number(p.valorCredito||0);
      byFunc[f].pecasNaoAproveitadas += Number(p.quantidadeNaoAproveitavel||0);
    }
  });
  const names = Object.keys(byFunc).sort((a,b)=>byFunc[b].pendente-byFunc[a].pendente);
  const totalPendente = names.reduce((s,n)=>s+byFunc[n].pendente,0);
  const totalCredito = names.reduce((s,n)=>s+byFunc[n].credito,0);

  let html = `<div class="metric-grid">
    <div class="metric"><div class="label">Total pendente</div><div class="value" style="color:var(--money)">${fmtMoney(totalPendente)}</div></div>
    <div class="metric"><div class="label">Valor em haver</div><div class="value" style="color:var(--perda)">${fmtMoney(totalCredito)}</div></div>
  </div>`;

  if(names.length===0){
    html += `<div class="empty">Nenhum lote retornado ainda.</div>`;
    return html;
  }
  html += `<div class="card">`;
  names.forEach(n=>{
    const b = byFunc[n];
    const liquido = b.pendente - b.credito;
    html += `<div class="item">
      <div class="item-top">
        <div><div class="item-title">${escapeHtml(n)}</div><div class="item-sub">Já pago: ${fmtMoney(b.pago)}</div></div>
        <div class="item-right" style="color:var(--money)">${fmtMoney(b.pendente)}</div>
      </div>
      ${b.credito>0 ? `<div class="item-note" style="color:var(--perda)">Valor em haver: ${fmtMoney(b.credito)} (${b.pecasNaoAproveitadas} peça(s) sem aproveitamento) · líquido a pagar: ${fmtMoney(liquido)}</div>` : ''}
      ${b.pendente>0 ? `<div class="item-actions"><button class="btn btn-primary" data-action="abrirPagamento" data-func="${encodeURIComponent(n)}">Marcar como pago</button></div>` : ''}
    </div>`;
  });
  html += `</div>`;
  return html;
}

function renderPerdas(){
  const nowIso = todayStr();
  const mesAtual = perdas.filter(p=>isSameMonth(p.data,nowIso));
  const sorted = [...perdas].sort((a,b)=> b.data.localeCompare(a.data));

  const tecidoNaoAproveitado = mesAtual.filter(p=>p.motivo==='Tecido não aproveitado (costura)');
  const pesoMes = tecidoNaoAproveitado.reduce((s,p)=>s+Number(p.pesoKg||0),0);
  const valorTecidoMes = tecidoNaoAproveitado.reduce((s,p)=>s+Number(p.valor||0),0);

  const semAproveitamento = mesAtual.filter(p=>p.motivo==='Peça sem aproveitamento (revisão)');
  const qtdPecasMes = semAproveitamento.reduce((s,p)=>s+Number(p.quantidade||0),0);
  const pesoDescartadoMes = semAproveitamento.reduce((s,p)=>s+Number(p.pesoKg||0),0);
  const valorTecidoDescarte = semAproveitamento.reduce((s,p)=>s+Number(p.valorTecido||0),0);
  const valorRibanaDescarte = semAproveitamento.reduce((s,p)=>s+Number(p.valorRibana||0),0);
  const valorCorteDescarte = semAproveitamento.reduce((s,p)=>s+Number(p.valorCorte||0),0);
  const valorInsumosDescarte = semAproveitamento.reduce((s,p)=>s+Number(p.valorInsumos||0),0);
  const valorPecasMes = semAproveitamento.reduce((s,p)=>s+Number(p.valor||0),0);

  const naoRetornou = mesAtual.filter(p=>p.motivo==='Peça não retornou (perda)');
  const qtdNaoRetornouMes = naoRetornou.reduce((s,p)=>s+Number(p.quantidade||0),0);
  const valorMateriaPrimaNaoRet = naoRetornou.reduce((s,p)=>s+Number(p.valorMateriaPrima||0),0);
  const valorCorteNaoRet = naoRetornou.reduce((s,p)=>s+Number(p.valorCorte||0),0);
  const valorNaoRetornouMes = naoRetornou.reduce((s,p)=>s+Number(p.valor||0),0);

  const outrasPerdas = mesAtual.filter(p=>p.motivo!=='Tecido não aproveitado (costura)' && p.motivo!=='Peça sem aproveitamento (revisão)' && p.motivo!=='Peça não retornou (perda)');
  const valorOutras = outrasPerdas.reduce((s,p)=>s+Number(p.valor||0),0);

  const totalMes = valorTecidoMes + valorPecasMes + valorNaoRetornouMes + valorOutras;

  let html = `<div class="metric-grid" style="grid-template-columns:1fr;">
    <div class="metric"><div class="label">Total perdido este mês</div><div class="value" style="color:var(--perda)">${fmtMoney(totalMes)}</div></div>
  </div>`;

  html += `<div class="section-title">Perda de tecido (peso)</div>
  <div class="card">
    <div class="item-top">
      <div><div class="item-title">Tecido que voltou da costura sem uso</div></div>
      <div class="item-right" style="color:var(--perda)">${pesoMes.toFixed(1)} kg<br><span class="mono">${fmtMoney(valorTecidoMes)}</span></div>
    </div>
  </div>`;

  html += `<div class="section-title">Peças sem aproveitamento (revisão)</div>
  <div class="card">
    <div class="item-top">
      <div><div class="item-title">Quantidade descartada</div></div>
      <div class="item-right">${qtdPecasMes} pç${pesoDescartadoMes>0?(' · '+pesoDescartadoMes.toFixed(1)+' kg'):''}</div>
    </div>
    <div class="stitch"></div>
    <div class="rate-row"><span>Tecido</span><span>${fmtMoney(valorTecidoDescarte)}</span></div>
    <div class="rate-row"><span>Ribana</span><span>${fmtMoney(valorRibanaDescarte)}</span></div>
    <div class="rate-row"><span>Corte (mão de obra)</span><span>${fmtMoney(valorCorteDescarte)}</span></div>
    ${valorInsumosDescarte>0?`<div class="rate-row"><span>Outros insumos</span><span>${fmtMoney(valorInsumosDescarte)}</span></div>`:''}
    <div class="stitch"></div>
    <div class="item-top"><div class="item-title">Total do prejuízo</div><div class="item-right" style="color:var(--perda)">${fmtMoney(valorPecasMes)}</div></div>
  </div>`;

  if(qtdNaoRetornouMes>0){
    html += `<div class="section-title">Peças que não retornaram da costura</div>
    <div class="card">
      <div class="item-top">
        <div><div class="item-title">Quantidade perdida</div></div>
        <div class="item-right">${qtdNaoRetornouMes} pç</div>
      </div>
      <div class="stitch"></div>
      <div class="rate-row"><span>Matéria-prima (tecido + ribana)</span><span>${fmtMoney(valorMateriaPrimaNaoRet)}</span></div>
      <div class="rate-row"><span>Corte (mão de obra)</span><span>${fmtMoney(valorCorteNaoRet)}</span></div>
      <div class="stitch"></div>
      <div class="item-top"><div class="item-title">Total do prejuízo</div><div class="item-right" style="color:var(--perda)">${fmtMoney(valorNaoRetornouMes)}</div></div>
    </div>`;
  }

  if(outrasPerdas.length>0){
    html += `<div class="section-title">Outras perdas</div>
    <div class="card">
      <div class="item-top"><div class="item-title">Tecido defeituoso, erro de corte/costura, etc.</div><div class="item-right" style="color:var(--perda)">${fmtMoney(valorOutras)}</div></div>
    </div>`;
  }

  html += `<div class="section-title">Histórico completo</div>`;
  if(sorted.length===0){
    html += `<div class="empty">Nenhuma perda registrada ainda.</div>`;
  }else{
    html += `<div class="card">`;
    sorted.forEach(p=>{
      html += `<div class="item">
        <div class="item-top">
          <div><div class="item-title">${escapeHtml(p.produto)}${p.quantidade?(' × '+p.quantidade):''}${p.pesoKg?(' · '+p.pesoKg+' kg'):''}</div><div class="item-sub">${escapeHtml(p.motivo)}${p.funcionario?' · '+escapeHtml(p.funcionario):''} · ${fmtDateBR(p.data)}</div></div>
          <div class="item-right" style="color:var(--perda)">${fmtMoney(p.valor)}</div>
        </div>
        <div class="item-actions">
          <button class="btn" data-action="editarPerda" data-id="${p.id}">Editar</button>
          <button class="btn btn-danger" data-action="delPerda" data-id="${p.id}">Excluir</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }
  return html;
}

  let html = `<div class="card">

        </div>
        <div class="item-actions">
          <button class="btn" data-action="editarInsumoExtra" data-id="${i.id}">Editar</button>
          <button class="btn btn-danger" data-action="delInsumoExtra" data-id="${i.id}">Excluir</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  if(lotesCorte.length===0){
    html += `<div class="section-title">Indicadores</div><div class="empty">Nenhum lote de corte com retorno registrado ainda.</div>`;
    return html;
  }

  const consumosTecido = lotesCorte.filter(p=>p.consumoTecidoPorPeca!=null).map(p=>p.consumoTecidoPorPeca);
  const consumosRibana = lotesCorte.filter(p=>p.consumoRibanaPorPeca!=null).map(p=>p.consumoRibanaPorPeca);
  const custosTecido = lotesCorte.filter(p=>p.custoTecidoPorPeca!=null).map(p=>p.custoTecidoPorPeca);
  const custosRibana = lotesCorte.filter(p=>p.custoRibanaPorPeca!=null).map(p=>p.custoRibanaPorPeca);
  const custosTotais = lotesCorte.filter(p=>p.custoMateriaPrimaPorPeca!=null).map(p=>p.custoMateriaPrimaPorPeca);
  const media = arr => arr.length ? arr.reduce((s,v)=>s+v,0)/arr.length : 0;

  const rendimentosBobina = lotesCorte.map(p=>Number(p.quantidadeRetornada||0));
  const melhorBobina = Math.max(...rendimentosBobina);
  const piorBobina = Math.min(...rendimentosBobina);
  const mediaBobina = media(rendimentosBobina);

  const rendimentosKg = lotesCorte.filter(p=>Number(p.pesoBobinas)>0).map(p=>Number(p.quantidadeRetornada||0)/Number(p.pesoBobinas));
  const melhorKg = rendimentosKg.length ? Math.max(...rendimentosKg) : 0;
  const piorKg = rendimentosKg.length ? Math.min(...rendimentosKg) : 0;

  html += `<div class="section-title">Rendimento (peças/kg) — indicador principal</div>

    <div class="metric"><div class="label">Melhor</div><div class="value" style="color:var(--revisao)">${melhorKg.toFixed(2)}</div></div>

    <div class="metric"><div class="label">Médio</div><div class="value">${mediaKg.toFixed(2)}</div></div>
  </div>`;

  html += `<div class="item-note" style="margin-bottom:12px;">Complementar — peças por bobina: melhor ${melhorBobina}, pior ${piorBobina}, médio ${mediaBobina.toFixed(0)} (varia conforme o peso de cada bobina).</div>`;

  html += `<div class="section-title">Consumo médio por peça</div>
  <div class="metric-grid">
    <div class="metric"><div class="label">Tecido (kg/peça)</div><div class="value">${media(consumosTecido).toFixed(3)}</div></div>
    <div class="metric"><div class="label">Ribana (kg/peça)</div><div class="value">${media(consumosRibana).toFixed(3)}</div></div>

  <div class="metric-grid">
    <div class="metric"><div class="label">Tecido / peça</div><div class="value">${fmtMoney(media(custosTecido))}</div></div>
    <div class="metric"><div class="label">Ribana / peça</div><div class="value">${fmtMoney(media(custosRibana))}</div></div>
    <div class="metric"><div class="label">Total matéria-prima / peça</div><div class="value">${fmtMoney(media(custosTotais))}</div></div>
  </div>`;

  const custosCompletos = lotesCorte.filter(p=>p.custoCompletoPorPeca!=null).map(p=>p.custoCompletoPorPeca);
  const pecasCorteTotal = lotesCorte.reduce((s,p)=>s+Number(p.quantidadeRetornada||0),0);
  const totalPerdasGeral = perdas.reduce((s,p)=>s+Number(p.valor||0),0);
  const custoBasePeca = media(custosCompletos);
  const perdaRateadaPeca = pecasCorteTotal>0 ? totalPerdasGeral/pecasCorteTotal : 0;
  const custoRealPeca = custoBasePeca + perdaRateadaPeca;

  html += `<div class="section-title">Custo real da peça (com perdas)</div>
  <div class="card">
    <div class="rate-row"><span>Custo base (tecido + ribana + insumos + corte)</span><span>${fmtMoney(custoBasePeca)}</span></div>
    <div class="rate-row"><span>Perdas rateadas por peça</span><span>${fmtMoney(perdaRateadaPeca)}</span></div>
    <div class="stitch"></div>
    <div class="item-top"><div class="item-title">Custo real por peça</div><div class="item-right" style="color:var(--perda)">${fmtMoney(custoRealPeca)}</div></div>
  </div>`;

  const nomesCustoComparativo = [...new Set(lotesCorte.map(p=>p.fornecedorTecido).filter(Boolean))];
  if(nomesCustoComparativo.length>0){
    const comparativo = nomesCustoComparativo.map(nome=>{
      const lotesF = lotesCorte.filter(p=>p.fornecedorTecido===nome && p.custoMateriaPrimaPorPeca!=null);
      return {nome, custoMedio: media(lotesF.map(p=>p.custoMateriaPrimaPorPeca))};
    }).sort((a,b)=>a.custoMedio-b.custoMedio);

    comparativo.forEach((c,i)=>{
      html += `<div class="item"><div class="item-top"><div class="item-title">${i===0?'🏆 ':''}${escapeHtml(c.nome)}</div><div class="item-right" style="color:${i===0?'var(--revisao)':'var(--text)'}">${fmtMoney(c.custoMedio)} / peça</div></div></div>`;

    html += `</div>`;
  }

      const custosCompletos = lotesF.filter(p=>p.custoCompletoPorPeca!=null).map(p=>p.custoCompletoPorPeca);
      const med = arr => arr.length ? arr.reduce((s,v)=>s+v,0)/arr.length : 0;
      return {
        nome, lotes: lotesF.length, pecasTotal,
        rendimentoKg: pesoTotal>0 ? pecasTotal/pesoTotal : 0,
        custoMPMedio: med(custosMP),
        custoCompletoMedio: med(custosCompletos)
      };
    });
    const porRendimento = [...desemp].sort((a,b)=>b.rendimentoKg-a.rendimentoKg);
    const porCusto = [...desemp].sort((a,b)=>a.custoCompletoMedio-b.custoCompletoMedio);

          <th style="padding:4px 8px;">Fornecedor</th><th style="padding:4px 8px;">Lotes</th><th style="padding:4px 8px;">Peças</th>

        </tr>
        ${desemp.map(d=>`<tr style="border-top:1px dashed var(--border);">
          <td style="padding:4px 8px;">${escapeHtml(d.nome)}</td><td style="padding:4px 8px;">${d.lotes}</td><td style="padding:4px 8px;">${d.pecasTotal}</td>
          <td style="padding:4px 8px;">${d.rendimentoKg.toFixed(2)}</td><td style="padding:4px 8px;">${fmtMoney(d.custoMPMedio)}</td><td style="padding:4px 8px;">${fmtMoney(d.custoCompletoMedio)}</td>
        </tr>`).join('')}
      </table>
    </div>`;
    html += `<div class="section-title">Ranking — melhor rendimento (peças/kg)</div><div class="card">`;
    porRendimento.forEach((d,i)=>{
      html += `<div class="item"><div class="item-top"><div class="item-title">${i===0?'🏆 ':''}${escapeHtml(d.nome)}</div><div class="item-right" style="color:${i===0?'var(--revisao)':'var(--text)'}">${d.rendimentoKg.toFixed(2)} pç/kg</div></div></div>`;
    });
    html += `</div>`;
    html += `<div class="section-title">Ranking — menor custo completo por peça</div><div class="card">`;
    porCusto.forEach((d,i)=>{
      html += `<div class="item"><div class="item-top"><div class="item-title">${i===0?'🏆 ':''}${escapeHtml(d.nome)}</div><div class="item-right" style="color:${i===0?'var(--revisao)':'var(--text)'}">${fmtMoney(d.custoCompletoMedio)} / peça</div></div></div>`;
    });
    html += `</div>`;
  }

  const nomesTecido = [...new Set(lotesCorte.map(p=>p.fornecedorTecido).filter(Boolean))];
  if(nomesTecido.length>0){
    const linhas = nomesTecido.map(nome=>{
      const lotesF = lotesCorte.filter(p=>p.fornecedorTecido===nome);
      const bobinas = lotesF.length;
      const pecasTotal = lotesF.reduce((s,p)=>s+Number(p.quantidadeRetornada||0),0);
      const pesoTotal = lotesF.reduce((s,p)=>s+Number(p.pesoBobinas||0),0);
      const custoTotal = lotesF.reduce((s,p)=>s+Number(p.pesoBobinas||0)*Number(p.precoKgTecido||0),0);
      return {
        nome, bobinas, pecasTotal,
        mediaPecasBobina: bobinas?pecasTotal/bobinas:0,
        mediaPecasKg: pesoTotal?pecasTotal/pesoTotal:0,
        consumoMedio: pecasTotal?pesoTotal/pecasTotal:0,
        custoMedio: pecasTotal?custoTotal/pecasTotal:0
      };
    }).sort((a,b)=>b.mediaPecasKg-a.mediaPecasKg);
    html += `<div class="section-title">Ranking de fornecedores — Tecido</div><div class="card" style="overflow-x:auto;">
      <table style="border-collapse:collapse; font-size:11.5px; white-space:nowrap;">

          <th style="padding:4px 8px;">Fornecedor</th><th style="padding:4px 8px;">Bobinas</th><th style="padding:4px 8px;">Peças</th>

  }

    const linhas = nomesRibana.map(nome=>{

      const custoTotal = lotesF.reduce((s,p)=>s+Number(p.pesoRibana||0)*Number(p.precoKgRibana||0),0);
      return {
        nome, lotes: lotesF.length, kgTotal,
        consumoMedio: pecasTotal?kgTotal/pecasTotal:0,
        custoMedio: pecasTotal?custoTotal/pecasTotal:0
      };
    }).sort((a,b)=>a.consumoMedio-b.consumoMedio);

  }

  const historico = [...lotesCorte].sort((a,b)=>b.dataRetorno.localeCompare(a.dataRetorno)).slice(0,20);
  html += `<div class="section-title">Histórico dos lotes</div><div class="card" style="overflow-x:auto;">
    <table style="border-collapse:collapse; font-size:11.5px; white-space:nowrap;">

        <th style="padding:4px 8px;">Data</th><th style="padding:4px 8px;">Produto</th><th style="padding:4px 8px;">Nº pedido</th><th style="padding:4px 8px;">Forn. tecido</th><th style="padding:4px 8px;">Forn. ribana</th>

        <th style="padding:4px 8px;">Total tecido</th><th style="padding:4px 8px;">Total ribana</th><th style="padding:4px 8px;">Total MP</th><th style="padding:4px 8px;">Custo MP/pç</th>
        <th style="padding:4px 8px;">Meta pç/bobina</th><th style="padding:4px 8px;">Real</th><th style="padding:4px 8px;">Diferença</th>
      </tr>
      ${historico.map(p=>{
        const totalTecido = Number(p.pesoBobinas||0)*Number(p.precoKgTecido||0);
        const totalRibana = Number(p.pesoRibana||0)*Number(p.precoKgRibana||0);
        const temMeta = Number(p.metaRendimentoBobina)>0;
        const diff = temMeta ? (p.diferencaRendimento!=null ? p.diferencaRendimento : (p.quantidadeRetornada-p.metaRendimentoBobina)) : null;
        const emoji = !temMeta ? '' : (diff>0?'🟢':(diff<0?'🔴':'🟡'));
        return `<tr style="border-top:1px dashed var(--border);">
        <td style="padding:4px 8px;">${fmtDateBR(p.dataRetorno)}</td><td style="padding:4px 8px;">${escapeHtml(p.produto)}</td><td style="padding:4px 8px;">${escapeHtml(p.numeroLoteFornecedor||'-')}</td>

        <td style="padding:4px 8px;">${p.pesoBobinas||0}</td><td style="padding:4px 8px;">${p.pesoRibana||0}</td><td style="padding:4px 8px;">${p.quantidadeRetornada||0}</td>
        <td style="padding:4px 8px;">${Number(p.pesoBobinas)>0?(Number(p.quantidadeRetornada||0)/Number(p.pesoBobinas)).toFixed(2):'-'}</td>
        <td style="padding:4px 8px;">${p.consumoTecidoPorPeca!=null?p.consumoTecidoPorPeca.toFixed(3):'-'}</td>
        <td style="padding:4px 8px;">${p.consumoRibanaPorPeca!=null?p.consumoRibanaPorPeca.toFixed(3):'-'}</td>
        <td style="padding:4px 8px;">${fmtMoney(totalTecido)}</td><td style="padding:4px 8px;">${fmtMoney(totalRibana)}</td><td style="padding:4px 8px;">${fmtMoney(totalTecido+totalRibana)}</td>

        <td style="padding:4px 8px;">${temMeta?(emoji+' '+(diff>=0?'+':'')+diff):'-'}</td>
      </tr>`;}).join('')}
    </table>
  </div>`;

  return html;
}

function finFmtInput(v){
  v = Number(v)||0;
  if(v===0) return '';
  return v.toLocaleString('pt-BR',{minimumFractionDigits:2, maximumFractionDigits:2});
}
function finParseInput(str){
  if(str==null) return 0;
  str = String(str).trim();
  if(!str) return 0;
  str = str.replace(/[^\d,.\-]/g,'');
  const neg = str.startsWith('-');
  if(neg) str = str.slice(1);
  const lastComma = str.lastIndexOf(',');
  const lastDot = str.lastIndexOf('.');
  const lastSep = Math.max(lastComma, lastDot);
  let intPart, decPart;
  if(lastSep === -1){
    intPart = str; decPart = '0';
  }else{
    const after = str.slice(lastSep+1);
    if(after.length>0 && after.length<=2 && /^\d+$/.test(after)){
      intPart = str.slice(0,lastSep).replace(/[,.]/g,'');
      decPart = after;
    }else{
      intPart = str.replace(/[,.]/g,'');
      decPart = '0';
    }
  }
  const n = parseFloat((intPart||'0') + '.' + decPart);
  return isNaN(n) ? 0 : (neg ? -n : n);
}
function finRenderTree(nodes, vals, editable, level){
  let html = '';
  nodes.forEach(node=>{
    const val = vals[node.key] || {p:0,a:0};
    const isSum = !!node.children;
    const pad = 10 + level*14;
    if(isSum){
      html += `<div class="fin-row fin-sum" style="padding-left:${pad}px;">
        <div class="fin-label">${escapeHtml(node.label)}</div>
        <div class="fin-vals"><span class="fin-val">${fmtMoney(val.p)}</span><span class="fin-val">${fmtMoney(val.a)}</span></div>
      </div>`;
      html += finRenderTree(node.children, vals, editable, level+1);
    }else{
      html += `<div class="fin-row" style="padding-left:${pad}px;">
        <div class="fin-label">${escapeHtml(node.label)}</div>
        <div class="fin-vals">
          ${editable ? `<input class="fin-input" type="text" inputmode="decimal" data-finkey="${node.key}" data-finfield="p" value="${finFmtInput(val.p)}" placeholder="0,00">` : `<span class="fin-val">${fmtMoney(val.p)}</span>`}
          ${editable ? `<input class="fin-input" type="text" inputmode="decimal" data-finkey="${node.key}" data-finfield="a" value="${finFmtInput(val.a)}" placeholder="0,00">` : `<span class="fin-val">${fmtMoney(val.a)}</span>`}
        </div>
      </div>`;
    }
  });
  return html;
}
function finRenderLeafRow(key, label, dados, editable){
  const raw = (dados && dados[key]) || {};
  const val = {p:Number(raw.p)||0, a:Number(raw.a)||0};
  return `<div class="fin-row" style="padding-left:10px;">
    <div class="fin-label">${escapeHtml(label)}</div>
    <div class="fin-vals">
      ${editable ? `<input class="fin-input" type="text" inputmode="decimal" data-finkey="${key}" data-finfield="p" value="${finFmtInput(val.p)}" placeholder="0,00">` : `<span class="fin-val">${fmtMoney(val.p)}</span>`}
      ${editable ? `<input class="fin-input" type="text" inputmode="decimal" data-finkey="${key}" data-finfield="a" value="${finFmtInput(val.a)}" placeholder="0,00">` : `<span class="fin-val">${fmtMoney(val.a)}</span>`}
    </div>
  </div>`;
}

function attachFinanceiroHandlers(){

  if(selAno) selAno.onchange = ()=>{ finAno = selAno.value; render(); };
  const btnMes = document.getElementById('btnFinMes');
  const btnAno = document.getElementById('btnFinAno');
  if(btnMes) btnMes.onclick = ()=>{ finModo='mes'; render(); };
  if(btnAno) btnAno.onclick = ()=>{ finModo='ano'; render(); };
  document.querySelectorAll('.fin-mes-btn').forEach(b=>{
    b.onclick = ()=>{ finMesIdx = Number(b.dataset.mesidx); render(); };
  });
  document.querySelectorAll('.fin-input').forEach(inp=>{
    inp.onchange = async ()=>{
      const key = inp.dataset.finkey;
      const field = inp.dataset.finfield;
      const val = finParseInput(inp.value);
      const ano = finAno, mes = FIN_MESES[finMesIdx];
      if(!financeiro[ano]) financeiro[ano] = {};
      if(!financeiro[ano][mes]) financeiro[ano][mes] = {};
      if(!financeiro[ano][mes][key]) financeiro[ano][mes][key] = {p:0,a:0};
      financeiro[ano][mes][key][field] = val;
      await saveFinanceiro();
      render();
    };
  });
}

let contasFiltro = 'abertas';
let contasBusca = '';
let contasFiltroCategoria = '';
let contasFiltroMes = '';
function renderContasPagar(){
  const hoje = todayStr();
  const naoHistorico = contasPagar.filter(c=>!c.historico);
  const abertas = naoHistorico.filter(c=>c.status!=='pago');
  const totalAberto = abertas.reduce((s,c)=>s+Number(c.valor||0),0);
  const totalVencido = abertas.filter(contaEstaVencida).reduce((s,c)=>s+Number(c.valor||0),0);
  const pagoMes = naoHistorico.filter(c=>c.status==='pago' && c.dataPagamento && c.dataPagamento.slice(0,7)===hoje.slice(0,7)).reduce((s,c)=>s+Number(c.valor||0),0);

  let html = `<div class="metric-grid">
    <div class="metric"><div class="label">Em aberto</div><div class="value" style="color:var(--money)">${fmtMoney(totalAberto)}</div></div>
    <div class="metric"><div class="label">Vencido</div><div class="value" style="color:var(--perda)">${fmtMoney(totalVencido)}</div></div>
    <div class="metric"><div class="label">Pago este mês</div><div class="value">${fmtMoney(pagoMes)}</div></div>
    <div class="metric"><div class="label">Contas em aberto</div><div class="value">${abertas.length}</div></div>
  </div>`;

  html += `<div class="filter-row">
    <button class="btn-toggle ${contasFiltro==='abertas'?'active':''}" id="btnContasAbertas">Em aberto</button>
    <button class="btn-toggle ${contasFiltro==='pagas'?'active':''}" id="btnContasPagas">Pagas</button>
    <button class="btn-toggle ${contasFiltro==='historico'?'active':''}" id="btnContasHistorico">Histórico</button>
  </div>`;

  const leaves = finExpenseLeaves();
  const leafLabel = key => { const l = leaves.find(x=>x.key===key); return l ? l.label : '—'; };

  let lista;
  if(contasFiltro==='abertas') lista = naoHistorico.filter(c=>c.status!=='pago').sort((a,b)=>(a.dataVencimento||'').localeCompare(b.dataVencimento||''));
  else if(contasFiltro==='pagas') lista = naoHistorico.filter(c=>c.status==='pago').sort((a,b)=>(b.dataPagamento||'').localeCompare(a.dataPagamento||''));
  else lista = contasPagar.filter(c=>c.historico).sort((a,b)=>(b.dataVencimento||'').localeCompare(a.dataVencimento||''));

  // opções de mês/ano com base em todas as contas (não muda conforme o filtro de status, pra ficar previsível)
  const mesesSet = new Set();
  contasPagar.forEach(c=>{
    if(c.dataVencimento) mesesSet.add(c.dataVencimento.slice(0,7));
    if(c.dataPagamento) mesesSet.add(c.dataPagamento.slice(0,7));
  });
  const mesesOptions = Array.from(mesesSet).sort();
  const fmtMesOpt = ym => { const [y,m]=ym.split('-'); return FIN_MESES[Number(m)-1]+'/'+y; };
  if(contasFiltroMes && !mesesOptions.includes(contasFiltroMes)) contasFiltroMes = '';

  const temFiltroAtivo = !!(contasBusca.trim() || contasFiltroCategoria || contasFiltroMes);
  html += `<div class="field"><input id="cp_busca" placeholder="Buscar por fornecedor ou descrição..." value="${escapeHtml(contasBusca)}"></div>
  <div class="row2">
    <div class="field"><select id="cp_filtroCategoria">
      <option value="">Todas as categorias</option>
      ${leaves.map(l=>`<option value="${l.key}" ${contasFiltroCategoria===l.key?'selected':''}>${escapeHtml(l.path)}</option>`).join('')}
    </select></div>
    <div class="field"><select id="cp_filtroMes">
      <option value="">Todos os meses</option>
      ${mesesOptions.map(m=>`<option value="${m}" ${contasFiltroMes===m?'selected':''}>${fmtMesOpt(m)}</option>`).join('')}
    </select></div>
  </div>
  ${temFiltroAtivo ? `<button class="btn" id="btnLimparFiltrosContas" style="margin-bottom:12px;">✕ Limpar filtros</button>` : ''}`;

  if(contasBusca.trim()){
    const q = normalizeTxt(contasBusca);
    lista = lista.filter(c=> normalizeTxt(c.fornecedor).includes(q) || normalizeTxt(c.descricao).includes(q));
  }
  if(contasFiltroCategoria){
    lista = lista.filter(c=>c.categoriaFinanceira===contasFiltroCategoria);
  }
  if(contasFiltroMes){
    lista = lista.filter(c=> (c.dataVencimento&&c.dataVencimento.slice(0,7)===contasFiltroMes) || (c.dataPagamento&&c.dataPagamento.slice(0,7)===contasFiltroMes) );
  }

  if(lista.length===0){
    const abaLabel = contasFiltro==='abertas'?'Em aberto':(contasFiltro==='pagas'?'Pagas':'Histórico');
    html += `<div class="empty">Nenhuma conta encontrada na aba "${abaLabel}"${temFiltroAtivo?' com esses filtros':''}.${temFiltroAtivo?' Tente limpar os filtros ou trocar de aba.':''}</div>`;
    return html;
  }

  html += `<div class="section-title">${lista.length} conta(s)</div>`;
  html += `<div class="card">`;
  lista.forEach(c=>{
    const vencida = contaEstaVencida(c);
    const statusTag = c.status==='pago' ? `<span class="tag tag-revisado">Pago</span>` : (vencida ? `<span class="tag" style="background:rgba(248,113,113,.15); color:var(--perda);">Vencido</span>` : `<span class="tag tag-enviado">Em aberto</span>`);
    html += `<div class="item">
      <div class="item-top">
        <div><div class="item-title">${escapeHtml(c.fornecedor)}</div><div class="item-sub">${escapeHtml(c.descricao||'')}</div></div>
        <div class="item-right">${statusTag}<br>${fmtMoney(c.valor)}</div>
      </div>
      <div class="item-note">Vencimento: ${fmtDateBR(c.dataVencimento)}${c.status==='pago'?(' · Pago em '+fmtDateBR(c.dataPagamento)):''}${c.categoriaFinanceira?(' · '+escapeHtml(leafLabel(c.categoriaFinanceira))):' · sem categoria'}${c.tipoPagamento?(' · '+escapeHtml(c.tipoPagamento)):''}</div>
      ${c.historico ? `<div class="item-note">Importado do histórico — não afeta o Financeiro</div>` : ''}
      <div class="item-actions">
        ${c.status!=='pago' ? `<button class="btn btn-primary" data-action="marcarContaPaga" data-id="${c.id}">Marcar como pago</button>` : `<button class="btn" data-action="reabrirConta" data-id="${c.id}">Reabrir</button>`}
        <button class="btn" data-action="editarConta" data-id="${c.id}">Editar</button>
        <button class="btn btn-danger" data-action="delConta" data-id="${c.id}" style="margin-left:auto;">Excluir</button>
      </div>
    </div>`;
  });
  html += `</div>`;
  return html;
}

function wireContaPagarSuggestion(){

function attachDynamicHandlers(){
  document.querySelectorAll('[data-action]').forEach(el=>{
    el.onclick = async ()=>{
      const action = el.dataset.action;
      const id = el.dataset.id;
      if(action==='delProducao'){
        producao = producao.filter(p=>p.id!==id);
        await saveProducao(); render(); showToast('Registro excluído');
      }else if(action==='marcarContaPaga'){
        const c = contasPagar.find(x=>x.id===id);
        if(!c.categoriaFinanceira){ openEditarContaPagarForm(id); showToast('Escolha a categoria financeira pra marcar como pago'); return; }
        c.status='pago'; c.dataPagamento=todayStr();
        reaplicarContaNoFinanceiro(c);
        await saveContasPagar(); await saveFinanceiro(); render(); showToast('Conta marcada como paga');
      }else if(action==='reabrirConta'){
        const c = contasPagar.find(x=>x.id===id);
        c.status='aberto'; c.dataPagamento=null;
        reaplicarContaNoFinanceiro(c);
        await saveContasPagar(); await saveFinanceiro(); render(); showToast('Conta reaberta');
      }else if(action==='editarConta'){
        openEditarContaPagarForm(id);
      }else if(action==='delConta'){
        const c = contasPagar.find(x=>x.id===id);
        reverterContaDoFinanceiro(c);
        contasPagar = contasPagar.filter(x=>x.id!==id);
        await saveContasPagar(); await saveFinanceiro(); render(); showToast('Conta excluída');
      }else if(action==='delPerda'){
        perdas = perdas.filter(p=>p.id!==id);
        await savePerdas(); render(); showToast('Perda excluída');
      }else if(action==='abrirPagamento'){
        openPagamentoForm(decodeURIComponent(el.dataset.func));
      }else if(action==='delFunc'){
        config = config.filter(c=>c.id!==id);
        await saveConfig(); render(); showToast('Removido');
      }else if(action==='addRate'){
        openRateForm(id);
      }else if(action==='delRate'){
        const produto = decodeURIComponent(el.dataset.produto);
        const f = config.find(c=>c.id===id);
        f.rates = f.rates.filter(r=>r.produto!==produto);
        await saveConfig(); render(); showToast('Valor removido');
      }else if(action==='registrarRetorno'){
        openRetornoForm(id);
      }else if(action==='registrarRevisao'){
        openRevisaoForm(id);
      }else if(action==='editarRevisao'){
        openEditarRevisaoForm(id);
      }else if(action==='editarLote'){
        openEditarLoteForm(id);
      }else if(action==='desfazerPagamento'){
        const p = producao.find(x=>x.id===id);
        p.paga = false; p.dataPagamento = null;
        await saveProducao(); render(); showToast('Pagamento desfeito');
      }else if(action==='reabrirCredito'){
        const p = producao.find(x=>x.id===id);
        p.creditoAplicado = false;
        await saveProducao(); render(); showToast('Crédito reaberto');
      }else if(action==='editarPerda'){
        openEditarPerdaForm(id);
      }else if(action==='editarFunc'){
        openEditarFuncionarioForm(id);

function buildResumoMensal(){
  const porMes = {};
  function garante(mes){
    if(!porMes[mes]) porMes[mes] = {corte:{qtd:0,valor:0}, costura:{qtd:0,valor:0}, revisao:{qtd:0,valor:0}, perdasValor:0, perdasPeso:0};
    return porMes[mes];
  }
  producao.forEach(p=>{
    if(p.status==='enviado' || !p.dataRetorno) return;
    const m = garante(p.dataRetorno.slice(0,7));
    if(m[p.etapa]){ m[p.etapa].qtd += Number(p.quantidadeRetornada||0); m[p.etapa].valor += Number(p.valorTotal||0); }
  });
  perdas.forEach(p=>{
    if(!p.data) return;
    const m = garante(p.data.slice(0,7));
    m.perdasValor += Number(p.valor||0);
    m.perdasPeso += Number(p.pesoKg||0);
  });
  return Object.keys(porMes).sort().map(mes=>({
    'Mês': mes,
    'Corte (peças)': porMes[mes].corte.qtd,
    'Corte (R$)': Number(porMes[mes].corte.valor.toFixed(2)),
    'Costura (peças)': porMes[mes].costura.qtd,
    'Costura (R$)': Number(porMes[mes].costura.valor.toFixed(2)),
    'Revisão (peças)': porMes[mes].revisao.qtd,
    'Revisão (R$)': Number(porMes[mes].revisao.valor.toFixed(2)),
    'Perdas (R$)': Number(porMes[mes].perdasValor.toFixed(2)),
    'Perdas (kg)': Number(porMes[mes].perdasPeso.toFixed(2))
  }));
}

function exportarExcel(){
  if(typeof XLSX==='undefined'){ showToast('Não consegui carregar o gerador de Excel, tenta de novo'); return; }
  const linhasProducao = producao.map(p=>({
    'Data envio': p.dataEnvio||'',
    'Etapa': STAGE_LABEL[p.etapa]||p.etapa,
    'Funcionário': p.funcionario||'',
    'Produto': p.produto||'',
    'Cor': p.cor||'',
    'Número do pedido': p.numeroLoteFornecedor||'',
    'Meta rendimento (pç/bobina)': p.metaRendimentoBobina||'',
    'Diferença rendimento': p.diferencaRendimento!=null?p.diferencaRendimento:'',
    'Peso bobina (kg)': p.pesoBobinas||'',
    'Status': STATUS_LABEL[p.status]||p.status,
    'Qtd retornada': p.quantidadeRetornada||0,
    'Data retorno': p.dataRetorno||'',
    'Valor unitário (R$)': p.valorUnit||0,
    'Valor total (R$)': p.valorTotal||0,
    'Pago': p.paga?'Sim':'Não',
    'Data pagamento': p.dataPagamento||'',
    'Peças aproveitáveis': p.quantidadeAproveitavel!=null?p.quantidadeAproveitavel:'',
    'Peças sem aproveitamento': p.quantidadeNaoAproveitavel||0,
    'Crédito gerado (R$)': p.valorCredito||0,
    'Peso não costurado (kg)': p.pesoNaoCosturado||''
  }));
  const linhasPerdas = perdas.map(p=>({
    'Data': p.data||'',
    'Produto': p.produto||'',
    'Quantidade': p.quantidade||'',
    'Peso (kg)': p.pesoKg||'',
    'Motivo': p.motivo||'',
    'Funcionário': p.funcionario||'',
    'Valor (R$)': p.valor||0
  }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(buildResumoMensal()), 'Resumo mensal');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(linhasProducao), 'Produção');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(linhasPerdas), 'Perdas');
  const dadosCompletos = JSON.stringify({producao, perdas, config, fornecedores, insumosExtras});
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet([['NAO EDITAR - usado para restaurar os dados'],[dadosCompletos]]), 'Backup');
  XLSX.writeFile(wb, 'relatorio-producao-'+todayStr()+'.xlsx');
  showToast('Relatório Excel gerado');
}

function importarExcel(file){
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const sheet = wb.Sheets['Backup'];
      if(!sheet){ showToast('Esse arquivo não tem os dados de restauração'); return; }
      const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
      const linhaJson = rows.find(r=>r[0] && r[0].startsWith && r[0].startsWith('{'));
      if(!linhaJson){ showToast('Não encontrei os dados de restauração nesse arquivo'); return; }
      const dados = JSON.parse(linhaJson[0]);
      producao = (dados.producao||[]).map(migrateLote);
      perdas = dados.perdas||[];
      config = dados.config||[];
      fornecedores = (dados.fornecedores||[]).map(migrateFornecedor);
      insumosExtras = dados.insumosExtras||[];
      await saveProducao(); await savePerdas(); await saveConfig(); await saveFornecedores(); await saveInsumosExtras();
      render(); showToast('Dados restaurados com sucesso');
    }catch(err){ showToast('Não consegui ler esse arquivo'); }
  };
  reader.readAsArrayBuffer(file);
}

  function tamanhoInputsHtml(prefix){

      <div class="row4">
        ${TAMS.map(t=>`<div class="field" style="margin-bottom:0;"><label>${t}</label><input class="${prefix}${t}" type="number" min="0" value="0"></div>`).join('')}

    if(etapaSelect.value==='corte'){
      campoEtapaEnvio.innerHTML = `
        <div class="row2">
          <div class="field"><label>Cor</label><input id="f_cor" placeholder="Ex: Preto"></div>
          <div class="field"><label>Fornecedor</label><select id="f_fornecedor">
            <option value="">Nenhum</option>
            ${fornecedores.map(f=>`<option value="${escapeHtml(f.nome)}" data-preco-tec="${f.precoTecidoKg}" data-preco-rib="${f.precoRibanaKg}">${escapeHtml(f.nome)} (${escapeHtml(f.tipoTecido)})</option>`).join('')}
          </select></div>
        </div>
        <div class="row2">
          <div class="field"><label>Peso do tecido (kg)</label><input id="f_peso" type="number" min="0" step="0.01" value="0"></div>
          <div class="field"><label>Preço tecido (R$/kg)</label><input id="f_precoTecido" type="number" min="0" step="0.01" value="0"></div>
        </div>
        <div class="row2">
          <div class="field"><label>Peso da ribana (kg)</label><input id="f_pesoRibana" type="number" min="0" step="0.01" value="0"></div>
          <div class="field"><label>Preço ribana (R$/kg)</label><input id="f_precoRibana" type="number" min="0" step="0.01" value="0"></div>
        </div>
        <div class="row2">
          <div class="field"><label>Número do pedido</label><input id="f_numeroLote" placeholder="Ex: 2026-0714"></div>

    }else{
      const lotesCorteDisponiveis = producao.filter(x=>x.etapa==='corte' && x.status!=='enviado').sort((a,b)=>b.dataRetorno.localeCompare(a.dataRetorno));
      campoEtapaEnvio.innerHTML = tamanhoInputsHtml('f_tamEnv') + `

        novoLote.custoLaborCorteHerdado = null;
        novoLote.proporcaoTecidoHerdada = null;
      }
    }
    producao.push(novoLote);
    await saveProducao(); closeModal(); render(); showToast('Envio registrado');

    <div class="checkfield">
      <input type="checkbox" id="f_pagoRetirada" checked>
      <label for="f_pagoRetirada">Já paguei na retirada</label>
    </div>
    <div class="field" id="wrapDataPag"><label>Data do pagamento</label><input id="f_dataPag" type="date" value="${todayStr()}"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveRetorno">Salvar</button>
    </div>
  `);
  const chk = document.getElementById('f_pagoRetirada');
  const wrapDataPag = document.getElementById('wrapDataPag');
  chk.onchange = ()=>{ wrapDataPag.style.display = chk.checked ? 'block' : 'none'; };
  document.getElementById('saveRetorno').onclick = async ()=>{
    const tam = {};
    TAMS.forEach(t=>{ tam[t] = Number(document.querySelector('.f_ret'+t).value)||0; });
    const qtd = somaTam(tam);
    const dataRetorno = document.getElementById('f_dataRet').value;
    const pagoNaRetirada = document.getElementById('f_pagoRetirada').checked;
    const dataPag = pagoNaRetirada ? document.getElementById('f_dataPag').value : null;

    if(isCorte){
      if(qtd<=0){ showToast('Informe ao menos uma peça'); return; }
      p.tamanhosCortados = tam;
      p.quantidadeRetornada = qtd;
      p.dataRetorno = dataRetorno;
      p.valorTotal = qtd * Number(p.valorUnit||0);
      p.status = 'retornado';
      p.paga = pagoNaRetirada;
      p.dataPagamento = dataPag;
      if(qtd>0){
        p.consumoTecidoPorPeca = Number(p.pesoBobinas||0) / qtd;
        p.consumoRibanaPorPeca = Number(p.pesoRibana||0) / qtd;
        p.custoTecidoPorPeca = p.consumoTecidoPorPeca * Number(p.precoKgTecido||0);
        p.custoRibanaPorPeca = p.consumoRibanaPorPeca * Number(p.precoKgRibana||0);
        p.custoInsumosExtrasPorPeca = custoInsumosExtrasPorPeca();
        p.custoMateriaPrimaPorPeca = p.custoTecidoPorPeca + p.custoRibanaPorPeca + p.custoInsumosExtrasPorPeca;
        p.custoCompletoPorPeca = p.custoMateriaPrimaPorPeca + Number(p.valorUnit||0);
        p.rendimentoObtido = qtd;
        p.diferencaRendimento = Number(p.metaRendimentoBobina||0)>0 ? qtd - Number(p.metaRendimentoBobina) : null;
      }
      await saveProducao(); closeModal(); render(); showToast('Retorno registrado');
      return;
    }

    // Costura: pode ser retorno parcial, e o que faltar pode ser marcado como perda
    const pesoNao = Number(document.getElementById('f_pesoNao').value)||0;
    const pendenteAntes = {};
    TAMS.forEach(t=>{ pendenteAntes[t] = Number(p.tamanhosEnviados?p.tamanhosEnviados[t]:0); });
    const perdaSolicitada = {};
    TAMS.forEach(t=>{ perdaSolicitada[t] = Number(document.querySelector('.f_perda'+t).value)||0; });
    const perda = {};
    const restante = {};
    TAMS.forEach(t=>{
      const sobraAposRetorno = Math.max(0, pendenteAntes[t] - (tam[t]||0));
      perda[t] = Math.min(perdaSolicitada[t]||0, sobraAposRetorno);
      restante[t] = sobraAposRetorno - perda[t];
    });
    const qtdPerda = somaTam(perda);
    const qtdRestante = somaTam(restante);

    if(qtd<=0 && qtdPerda<=0){ showToast('Informe ao menos uma peça retornada ou perdida'); return; }

    if(qtdPerda>0){
      const calc = calcularPerdaNaoRetorno(p, qtdPerda);
      perdas.push({id:uid(), loteId:p.id, data:dataRetorno, produto:p.produto, quantidade:qtdPerda,
        valorMateriaPrima:calc.valorMateriaPrima, valorCorte:calc.valorCorte,
        motivo:'Peça não retornou (perda)', valor:calc.valorTotal, funcionario:p.funcionario});
      await savePerdas();
    }
    if(pesoNao>0){
      const precoKgTec = p.precoKgTecidoHerdado!=null ? p.precoKgTecidoHerdado : precoMedioTecidoPorProduto(p.produto);
      const valorPerdaTecido = pesoNao * precoKgTec;
      perdas.push({id:uid(), data:dataRetorno, produto:p.produto, quantidade:null, pesoKg:pesoNao, motivo:'Tecido não aproveitado (costura)', valor:valorPerdaTecido, funcionario:p.funcionario});
      await savePerdas();
    }

    if(qtd<=0 && qtdRestante<=0){
      // nada retornou agora e não sobrou pendência: tudo que faltava virou perda, encerra o lote
      producao = producao.filter(x=>x.id!==p.id);
      await saveProducao(); closeModal(); render(); showToast('Perda registrada e lote encerrado.');
      return;
    }

    if(qtdRestante>0){
      if(qtd>0){
        // ainda sobra pendência: separa o que voltou agora num registro próprio (segue revisão/pagamento normalmente)
        const registro = JSON.parse(JSON.stringify(p));
        registro.id = uid();
        registro.tamanhosEnviados = {...tam};
        registro.tamanhosRetornados = {...tam};
        registro.quantidadeEnviada = qtd;
        registro.quantidadeRetornada = qtd;
        registro.dataRetorno = dataRetorno;
        registro.status = 'retornado';
        registro.paga = pagoNaRetirada;
        registro.dataPagamento = dataPag;
        registro.valorTotal = qtd * Number(p.valorUnit||0);
        registro.pesoNaoCosturado = pesoNao;
        producao.push(registro);
      }
      p.tamanhosEnviados = restante;
      p.quantidadeEnviada = qtdRestante;
      await saveProducao(); closeModal(); render();
      showToast((qtdPerda>0?'Perda registrada. ':'')+'Retorno parcial registrado. Ainda faltam '+qtdRestante+' peça(s) pra retirar.');
    }else{
      // fecha o lote: o que voltou agora é o retorno final (o resto, se houver, já virou perda acima)
      p.tamanhosRetornados = tam;
      p.quantidadeRetornada = qtd;
      p.dataRetorno = dataRetorno;
      p.valorTotal = qtd * Number(p.valorUnit||0);
      p.status = 'retornado';
      p.paga = pagoNaRetirada;
      p.dataPagamento = dataPag;
      p.pesoNaoCosturado = pesoNao;
      await saveProducao(); closeModal(); render(); showToast('Retorno registrado'+(qtdPerda>0?' e perda registrada':'')+'.');
    }
  };
}

function calcularPerdaNaoRetorno(p, qtd){
  const materiaPrima = p.custoCorteHerdado!=null ? p.custoCorteHerdado : custoMedioMateriaPrimaPorProduto(p.produto);
  const laborCorte = p.custoLaborCorteHerdado!=null ? p.custoLaborCorteHerdado : custoLaborCorteMedioPorProduto(p.produto);
  const valorMateriaPrima = materiaPrima * qtd;
  const valorCorte = laborCorte * qtd;
  return {valorMateriaPrima, valorCorte, valorTotal: valorMateriaPrima + valorCorte};
}

function calcularPerdaRevisao(p, naoAprov, pesoDescartado){
  const custoLaborCorte = p.custoLaborCorteHerdado!=null ? p.custoLaborCorteHerdado : custoLaborCorteMedioPorProduto(p.produto);
  const precoKgTec = p.precoKgTecidoHerdado!=null ? p.precoKgTecidoHerdado : precoMedioTecidoPorProduto(p.produto);
  const precoKgRib = p.precoKgRibanaHerdado!=null ? p.precoKgRibanaHerdado : precoMedioRibanaPorProduto(p.produto);
  const proporcaoTec = p.proporcaoTecidoHerdada!=null ? p.proporcaoTecidoHerdada : proporcaoTecidoPorProduto(p.produto);
  const tecidoKgPerdido = pesoDescartado * proporcaoTec;
  const ribanaKgPerdido = pesoDescartado * (1-proporcaoTec);
  const valorTecido = tecidoKgPerdido * precoKgTec;
  const valorRibana = ribanaKgPerdido * precoKgRib;
  const valorCorte = naoAprov * custoLaborCorte;
  const valorInsumos = naoAprov * custoInsumosExtrasPorPeca();
  const valorTotal = valorTecido + valorRibana + valorCorte + valorInsumos;
  return {tecidoKgPerdido, ribanaKgPerdido, valorTecido, valorRibana, valorCorte, valorInsumos, valorTotal};
}

function openPagamentoForm(funcNome){
  const lotes = producao.filter(p=>p.status!=='enviado' && (p.funcionario||'Sem nome')===funcNome && !p.paga);
  const pendente = lotes.reduce((s,p)=>s+Number(p.valorTotal||0),0);
  const creditos = producao.filter(p=>p.status==='revisado' && (p.funcionario||'Sem nome')===funcNome && !p.creditoAplicado);
  const credito = creditos.reduce((s,p)=>s+Number(p.valorCredito||0),0);
  openModal(`
    <h3>Pagamento — ${escapeHtml(funcNome)}</h3>
    <div class="field hint">Pendente: ${fmtMoney(pendente)}</div>
    ${credito>0 ? `
    <div class="checkfield">
      <input type="checkbox" id="f_aplicarCredito" checked>
      <label for="f_aplicarCredito">Abater valor em haver (${fmtMoney(credito)}) neste pagamento</label>
    </div>` : ''}
    <div class="field"><label>Valor a pagar</label><input id="f_valorPagoDisplay" type="text" value="${fmtMoney(pendente-(credito>0?credito:0))}" disabled></div>
    <div class="field"><label>Data do pagamento</label><input id="f_dataPagto" type="date" value="${todayStr()}"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveConfirmPag">Confirmar pagamento</button>
    </div>
  `);
  const chkCredito = document.getElementById('f_aplicarCredito');
  const display = document.getElementById('f_valorPagoDisplay');
  if(chkCredito){
    chkCredito.onchange = ()=>{
      display.value = fmtMoney(pendente - (chkCredito.checked ? credito : 0));
    };
  }
  document.getElementById('saveConfirmPag').onclick = async ()=>{
    const dataPagamento = document.getElementById('f_dataPagto').value;
    const aplicarCredito = chkCredito ? chkCredito.checked : false;
    lotes.forEach(p=>{ p.paga = true; p.dataPagamento = dataPagamento; });
    if(aplicarCredito) creditos.forEach(p=>{ p.creditoAplicado = true; });
    await saveProducao(); closeModal(); render();
    showToast(aplicarCredito && credito>0 ? 'Pagamento confirmado, crédito abatido' : 'Pagamento confirmado');
  };
}

      <option value="colaborador">Colaborador (Painel, Produção e Revisão · sem editar/excluir)</option>
      <option value="admin">Administrador (acesso total)</option>
    </select></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveUsuario">Salvar</button>
    </div>
  `);
  document.getElementById('saveUsuario').onclick = async ()=>{
    const nome = document.getElementById('f_uNome').value.trim();
    const senha = document.getElementById('f_uSenha').value;
    const papel = document.getElementById('f_uPapel').value;
    if(!nome || !senha){ showToast('Preencha nome e senha'); return; }
    if(usuarios.some(u=>u.nome.toLowerCase()===nome.toLowerCase())){ showToast('Já existe um usuário com esse nome'); return; }
    usuarios.push({id:uid(), nome, senha: await hashPassword(senha), papel});
    await saveUsuarios(); closeModal(); render(); showToast('Usuário criado');
  };
}

function openEditarUsuarioForm(uId){
  const u = usuarios.find(x=>x.id===uId);
  openModal(`
    <h3>Editar usuário</h3>
    <div class="field"><label>Nome</label><input id="f_uNome" value="${escapeHtml(u.nome)}"></div>
    <div class="field"><label>Senha</label><input id="f_uSenha" type="password" placeholder="Deixe em branco para manter"></div>
    <div class="field"><label>Permissão</label><select id="f_uPapel">
      <option value="colaborador" ${u.papel==='colaborador'?'selected':''}>Colaborador (Painel, Produção e Revisão · sem editar/excluir)</option>
      <option value="admin" ${u.papel==='admin'?'selected':''}>Administrador (acesso total)</option>
    </select></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveUsuarioEdit">Salvar</button>
    </div>
  `);
  document.getElementById('saveUsuarioEdit').onclick = async ()=>{
    const nome = document.getElementById('f_uNome').value.trim();
    const senha = document.getElementById('f_uSenha').value;
    if(!nome){ showToast('Preencha o nome'); return; }
    u.nome = nome;
    if(senha) u.senha = await hashPassword(senha);
    u.papel = document.getElementById('f_uPapel').value;
    await saveUsuarios(); closeModal(); render(); showToast('Usuário atualizado');
    if(currentUser && currentUser.id===u.id){ currentUser = u; updateUserBadge(); }
  };
}

function openEditarPerdaForm(perdaId){
  const p = perdas.find(x=>x.id===perdaId);
  const MOTIVOS = ['Tecido defeituoso','Erro de corte','Erro de costura','Peça sem aproveitamento (revisão)','Tecido não aproveitado (costura)','Peça não retornou (perda)','Outro'];
  openModal(`
    <h3>Editar perda</h3>
    <div class="row2">
      <div class="field"><label>Data</label><input id="f_dataP" type="date" value="${p.data}"></div>
      <div class="field"><label>Quantidade (peças)</label><input id="f_qtdP" type="number" min="0" value="${p.quantidade||0}"></div>
    </div>
    <div class="field"><label>Produto</label><input id="f_prodP" value="${escapeHtml(p.produto)}"></div>
    <div class="row2">
      <div class="field"><label>Motivo</label><select id="f_motivo">${MOTIVOS.map(m=>`<option ${m===p.motivo?'selected':''}>${m}</option>`).join('')}</select></div>
      <div class="field"><label>Peso (kg)</label><input id="f_pesoP" type="number" min="0" step="0.01" value="${p.pesoKg||0}"></div>
    </div>
    <div class="field"><label>Valor estimado (R$)</label><input id="f_valP" type="number" min="0" step="0.01" value="${p.valor}"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="savePerdaEdit">Salvar</button>
    </div>
  `);
  document.getElementById('savePerdaEdit').onclick = async ()=>{
    p.data = document.getElementById('f_dataP').value;
    p.quantidade = Number(document.getElementById('f_qtdP').value)||null;
    p.produto = document.getElementById('f_prodP').value.trim();
    p.motivo = document.getElementById('f_motivo').value;
    p.pesoKg = Number(document.getElementById('f_pesoP').value)||null;
    p.valor = Number(document.getElementById('f_valP').value);
    await savePerdas(); closeModal(); render(); showToast('Perda atualizada');
  };
}

function openEditarLoteForm(loteId){
  const p = producao.find(x=>x.id===loteId);
  openModal(`
    <h3>Editar lote — ${escapeHtml(p.produto)}</h3>
    <div class="field"><label>Produto</label><input id="f_editProd" value="${escapeHtml(p.produto)}"></div>
    <div class="field"><label>Data do envio</label><input id="f_editDataEnvio" type="date" value="${p.dataEnvio}"></div>
    <div class="field"><label>Valor unitário (R$)</label><input id="f_editVal" type="number" min="0" step="0.01" value="${p.valorUnit}"></div>
    ${p.status!=='enviado' ? `
    <div class="row2">
      <div class="field"><label>Total de peças retornadas</label><input id="f_editRetorno" type="number" min="0" value="${p.quantidadeRetornada}"></div>
      <div class="field"><label>Data do retorno</label><input id="f_editDataRet" type="date" value="${p.dataRetorno||''}"></div>
    </div>` : ''}
    ${p.status==='revisado' ? `<div class="field"><label>Peças aproveitáveis</label><input id="f_editAprov" type="number" min="0" value="${p.quantidadeAproveitavel}"></div>` : ''}
    <div class="field hint">Editar quantidade ou valor recalcula automaticamente os totais e créditos deste lote.</div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="saveLoteEdit">Salvar</button>
    </div>
  `);
  document.getElementById('saveLoteEdit').onclick = async ()=>{
    p.produto = document.getElementById('f_editProd').value.trim();
    p.dataEnvio = document.getElementById('f_editDataEnvio').value;
    p.valorUnit = Number(document.getElementById('f_editVal').value);
    if(p.status!=='enviado'){
      p.quantidadeRetornada = Number(document.getElementById('f_editRetorno').value);
      p.dataRetorno = document.getElementById('f_editDataRet').value;
      p.valorTotal = p.quantidadeRetornada * p.valorUnit;
    }
    if(p.status==='revisado'){
      const aprov = Number(document.getElementById('f_editAprov').value);
      const naoAprov = Math.max(0, p.quantidadeRetornada - aprov);
      p.quantidadeAproveitavel = aprov;
      p.quantidadeNaoAproveitavel = naoAprov;
      p.valorCredito = naoAprov * p.valorUnit;
    }
    await saveProducao(); closeModal(); render(); showToast('Lote atualizado');
  };
}

  render();
  await loadAll();
  let savedId = null;
  try{ savedId = localStorage.getItem('jl_session'); }catch(e){}

    if(u) currentUser = u;
  }
  applyAuthState();
})();
